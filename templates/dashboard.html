<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1563986768609-322da13575f3") no-repeat center/cover;
color:white;
}

.overlay{
background:rgba(0,0,0,0.8);
height:100vh;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:space-around;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:10px;
width:200px;
text-align:center;
font-size:20px;
}

.chart-container{
width:70%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:80%;
margin:auto;
margin-top:40px;
background:white;
color:black;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Admin Dashboard - SecurePay</h1>

<div class="cards">

<div class="card">
Total Transactions
<h2>{{ total }}</h2>
</div>

<div class="card">
Total Revenue
<h2>{{ revenue }} $</h2>
</div>

<div class="card">
Clients
<h2>{{ clients }}</h2>
</div>

</div>

<div class="chart-container">
<canvas id="transactionChart"></canvas>
</div>

<table>

<tr>
<th>ID</th>
<th>Nom</th>
<th>Produit</th>
<th>Montant</th>
<th>Date</th>
</tr>

{% for t in transactions %}

<tr>
<td>{{t[0]}}</td>
<td>{{t[1]}}</td>
<td>{{t[2]}}</td>
<td>{{t[3]}} $</td>
<td>{{t[4]}}</td>
</tr>

{% endfor %}

</table>

</div>

<script>

const ctx = document.getElementById('transactionChart');

new Chart(ctx, {

type: 'bar',

data: {

labels: ['Laptop','Phone','Watch','Desktop'],

datasets: [{

label: 'Transactions',

data: [12,19,7,5],

borderWidth:1

}]

},

options:{

scales:{
y:{
beginAtZero:true
}
}

}

});

</script>

</body>

</html>
