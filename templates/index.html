<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement Sécurisé</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:url("{{ url_for('static', filename='images/laptop.jpg') }}") no-repeat center center/cover;
}

/* overlay sombre */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* navigation */

.navbar{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
color:white;
z-index:2;
}

.navbar h1{
font-size:28px;
color:#00d4ff;
}

.navbar a{
text-decoration:none;
color:white;
margin-left:25px;
font-size:16px;
transition:0.3s;
}

.navbar a:hover{
color:#00d4ff;
}

/* section principale */

.hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:2;
width:80%;
}

.hero h2{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:40px;
line-height:1.6;
}

/* bouton */

.btn{
padding:15px 40px;
background:#00d4ff;
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#0099cc;
}

/* animation */

.hero{
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
0%{
opacity:0;
transform:translate(-50%,-40%);
}

100%{
opacity:1;
transform:translate(-50%,-50%);
}
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="navbar">
<h1>SecurePay</h1>

<div>
<a href="/">Accueil</a>
<a href="/shop">Boutique</a>
<a href="/admin">Admin</a>
</div>

</div>

<div class="hero">

<h2>Système de Paiement en Ligne Sécurisé</h2>

<p>
Plateforme e-commerce sécurisée avec authentification OTP, chiffrement SSL,
protection contre attaques brute force et validation des transactions.
</p>

<a href="/shop">
<button class="btn">Accéder à la boutique</button>
</a>

</div>

</body>
</html>
