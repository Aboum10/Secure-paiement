<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Vérification OTP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

background:url("https://images.unsplash.com/photo-1550565094-6d1c5c1edc0b") 
no-repeat center center/cover;

display:flex;
justify-content:center;
align-items:center;

}

/* overlay sombre */

.overlay{

position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);

}

/* boite OTP */

.container{

position:relative;

background:white;

padding:40px;

width:350px;

border-radius:10px;

box-shadow:0px 10px 25px rgba(0,0,0,0.4);

text-align:center;

z-index:2;

}

/* titre */

.container h2{

margin-bottom:20px;
color:#333;

}

/* input */

input{

width:100%;
padding:12px;

margin:15px 0;

border-radius:5px;

border:1px solid #ccc;

font-size:16px;

text-align:center;
letter-spacing:3px;

}

/* bouton */

button{

width:100%;

padding:12px;

background:#007bff;

border:none;

color:white;

font-size:16px;

border-radius:5px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#0056b3;

}

/* texte */

p{

margin-bottom:10px;
color:#666;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<h2>Vérification OTP</h2>

<p>Entrez le code de sécurité</p>

<form method="POST">

<input type="text" name="otp" placeholder="Entrer OTP" required>

<button type="submit">Vérifier</button>

</form>

</div>

</body>
</html>
