<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Paiement Réussi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

background:url("https://images.unsplash.com/photo-1563013544-824ae1b704d3")
no-repeat center center/cover;

display:flex;
justify-content:center;
align-items:center;

}

/* overlay sombre */

.overlay{

position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);

}

/* boite principale */

.container{

position:relative;

background:white;

padding:50px;

width:450px;

border-radius:12px;

box-shadow:0px 15px 40px rgba(0,0,0,0.5);

text-align:center;

z-index:2;

}

/* icone */

.success-icon{

font-size:70px;
color:green;
margin-bottom:20px;

}

/* titre */

h1{

color:#28a745;
font-size:38px;
margin-bottom:15px;

}

/* texte */

p{

color:#555;
font-size:18px;
margin-bottom:30px;

}

/* bouton */

button{

padding:12px 30px;

border:none;

background:#007bff;

color:white;

font-size:16px;

border-radius:6px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#0056b3;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="success-icon">
✔
</div>

<h1>Le paiement réussi</h1>

<p>Votre transaction a été effectuée avec succès.</p>

<a href="/shop">
<button>Retour à la boutique</button>
</a>

</div>

</body>

</html>
