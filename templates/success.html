<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement réussi</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Background stylé */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #00ffcc;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            margin-top: 10px;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #00cc99;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>✅ Paiement réussi</h1>

    <p>
        Merci de votre fidélité 🙏<br>
        À très bientôt sur notre plateforme !
    </p>

    <!-- Bouton retour -->
    <a href="/shop" class="btn">⬅ Retour à la boutique</a>
</div>

</body>
</html>
