<!DOCTYPE html>
<html>

<head>
<title>Paiement sécurisé</title>

<style>

body{
font-family:Arial;
background:#2c3e50;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

form{
background:white;
color:black;
padding:40px;
border-radius:10px;
width:350px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px;
width:100%;
}

</style>

</head>

<body>

<form action="/payment" method="POST">

<h2>Paiement sécurisé</h2>

<input name="name" placeholder="Nom">

<input name="card" placeholder="Numéro de carte">

<input name="exp" placeholder="Date expiration">

<input name="cvv" placeholder="CVV">

<input type="text" value="{{ amount }}" readonly>

<input type="email" name="email" placeholder="Votre email" required>

<button>Payer</button>

</form>

<script>

document.getElementById("amount").value = localStorage.getItem("amount")

</script>

</body>

</html>
