body{
margin:0;

header{

align-items:center;
padding:20px;
background:#0b1d3a;
}

header h1{
margin:0;
}

nav a{
color:white;
margin:15px;
text-decoration:none;

}

.hero{

}

.hero h2{
font-size:40px;
}

.products{
display:grid;

padding:40px;
}

.card{
background:white;
color:black;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:20px;
text-align:center;
}

.price{
font-size:22px;
color:#e67e22;
margin:10px 0;
}

.btn{
background:#ff6600;
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#e55a00;
}

footer{
text-align:center;
padding:20px;
background:#0b1d3a;
margin-top:40px;
}

</style>
