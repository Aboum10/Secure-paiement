<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SecureShop - E-commerce sécurisé</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0b1d3a;
}

header h1{
margin:0;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px;
}

.hero h2{
font-size:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:white;
color:black;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:20px;
text-align:center;
}

.price{
font-size:22px;
color:#e67e22;
margin:10px 0;
}

.btn{
background:#ff6600;
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#e55a00;
}

footer{
text-align:center;
padding:20px;
background:#0b1d3a;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>SecureShop</h1>

<nav>
<a href="/">Accueil</a>
<a href="/shop">Produits</a>
<a href="/dashboard">Dashboard</a>
</nav>

</header>

<section class="hero">

<h2>Bienvenu dans notre boutique en ligne</h2>

<p>Faites vos achats en toute sécurité</p>

</section>

<section class="products">

<div class="card">

<img src="watch.jpg">

<div class="card-body">

<h3>Smart Watch</h3>

<p class="price">$120</p>

<button class="btn" onclick="buyProduct('Smart Watch',120)">Acheter</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">

<div class="card-body">

<h3>Laptop</h3>

<p class="price">$700</p>

<button class="btn" onclick="buyProduct('Laptop',700)">Acheter</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

<div class="card-body">

<h3>Desktop Computer</h3>

<p class="price">$900</p>

<button class="btn" onclick="buyProduct('Desktop Computer',900)">Acheter</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<div class="card-body">

<h3>Smartphone</h3>

<p class="price">$400</p>

<button class="btn" onclick="buyProduct('Smartphone',400)">Acheter</button>

</div>

</div>

</section>

<footer>

<p>SecureShop © 2026 - Paiement sécurisé</p>

</footer>

<script>

function buyProduct(product,price){

localStorage.setItem("product",product)

localStorage.setItem("amount",price)

window.location.href="/payment"

}

</script>

</body>
</html>
